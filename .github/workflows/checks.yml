name: Pre-checks & tests
run-name: pre-checks and tests triggered by ${{ github.actor }}

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        description: The OS to run the workflow on.
        type: string
        default: "ubuntu-22.04"
      test-folder:
        required: true
        description: The name of the test folder.
        type: string
        default: "tests"

jobs:
  pre-checks:
    permissions:
      contents: read
    runs-on: ${{ inputs.runs-on }}

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install the project
        run: |
          uv sync --all-extras --dev
      - name: Run pre-commit
        run: |
          SKIP=ub-lock uv run pre-commit run --all-files
      - name: Run tests
        run: |
          uv run pytest ${{ inputs.test-folder }}
      - name: Run test coverage
        run: |
          uv run pytest --cov
